<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>codex-headless debugger</title>
  <link rel="stylesheet" href="../../node_modules/@xterm/xterm/css/xterm.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #0a0a0a; color: #d4d4d4; font-family: 'JetBrains Mono', 'Fira Code', monospace; }

    .container { display: flex; height: 100vh; }

    /* Left: live terminal */
    .terminal-pane {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column;
      border-right: 1px solid #333;
    }
    .terminal-pane .header {
      padding: 6px 12px;
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
      color: #7dd3a0; border-bottom: 1px solid #333;
      flex-shrink: 0;
    }
    .terminal-pane .xterm-container {
      flex: 1; min-height: 0; padding: 4px;
    }

    /* Right: parser diagnostics */
    .parser-pane {
      width: 420px; flex-shrink: 0;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .parser-pane .header {
      padding: 6px 12px;
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
      color: #ff9f4a; border-bottom: 1px solid #333;
      flex-shrink: 0;
    }
    .parser-pane .content {
      flex: 1; overflow-y: auto; padding: 8px 12px;
      font-size: 11px; line-height: 1.5;
    }

    .section { margin-bottom: 16px; }
    .section-title {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
      color: #888; margin-bottom: 4px;
    }
    .section pre {
      background: #151515; padding: 8px; overflow-x: auto;
      white-space: pre-wrap; word-break: break-all;
      max-height: 200px; overflow-y: auto;
      border: 1px solid #222;
      font-size: 11px;
    }
    .section pre.empty { color: #555; font-style: italic; }

    .state-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 4px 12px;
    }
    .state-item { display: flex; align-items: center; gap: 6px; }
    .state-dot {
      width: 6px; height: 6px; border-radius: 50%;
      flex-shrink: 0;
    }
    .state-dot.on { background: #7dd3a0; }
    .state-dot.off { background: #444; }
  </style>
</head>
<body>
  <div class="container">
    <div class="terminal-pane">
      <div class="header" style="display:flex;align-items:center;justify-content:space-between;">
        <span>live terminal — codex pty</span>
        <span id="recording-path" style="color:#666;font-size:9px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
      </div>
      <div class="xterm-container" id="terminal"></div>
    </div>
    <div class="parser-pane">
      <div class="header" style="display:flex;align-items:center;justify-content:space-between;">
        <span>parser diagnostics</span>
        <button id="btn-reset" style="
          background:#222; color:#ff9f4a; border:1px solid #444;
          padding:2px 10px; font-size:10px; cursor:pointer;
          font-family:inherit; text-transform:uppercase; letter-spacing:0.05em;
        ">reset</button>
      </div>
      <div class="content" id="diagnostics">
        <div class="section">
          <div class="section-title">state</div>
          <div class="state-grid" id="state-grid"></div>
        </div>
        <div class="section">
          <div class="section-title">extractAssistantInProgress</div>
          <pre id="out-assistant" class="empty">(waiting…)</pre>
        </div>
        <div class="section">
          <div class="section-title">extractStreamingText</div>
          <pre id="out-streaming" class="empty">(waiting…)</pre>
        </div>
        <div class="section">
          <div class="section-title">raw screen (last 20 lines)</div>
          <pre id="out-screen" class="empty">(waiting…)</pre>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { Terminal } from '../../node_modules/@xterm/xterm/lib/xterm.mjs'
    import { FitAddon } from '../../node_modules/@xterm/addon-fit/lib/addon-fit.mjs'
    const { ipcRenderer } = require('electron')

    // --- Terminal setup ---
    const term = new Terminal({
      fontSize: 13,
      fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
      theme: {
        background: '#0a0a0a',
        foreground: '#d4d4d4',
        cursor: '#7dd3a0',
      },
      allowProposedApi: true,
    })
    const fit = new FitAddon()
    term.loadAddon(fit)
    term.open(document.getElementById('terminal'))
    fit.fit()

    window.addEventListener('resize', () => {
      fit.fit()
      const dims = fit.proposeDimensions()
      if (dims) ipcRenderer.send('pty-resize', { cols: dims.cols, rows: dims.rows })
    })

    // PTY data → xterm
    ipcRenderer.on('pty-data', (_evt, data) => {
      term.write(data)
    })

    // Keyboard → PTY
    term.onData(data => {
      ipcRenderer.send('pty-input', data)
    })

    // Exit
    ipcRenderer.on('pty-exit', (_evt, { exitCode, signal }) => {
      term.write(`\r\n\x1b[33m[codex exited: code=${exitCode} signal=${signal ?? '-'}]\x1b[0m\r\n`)
    })

    // --- Parser diagnostics ---
    const elAssistant = document.getElementById('out-assistant')
    const elStreaming = document.getElementById('out-streaming')
    const elScreen = document.getElementById('out-screen')
    const elStateGrid = document.getElementById('state-grid')

    const stateKeys = ['hasTrustDialog', 'hasWorking', 'hasSpinner', 'hasAssistantMarker', 'hasPrompt', 'idle']

    function renderState(state) {
      elStateGrid.innerHTML = stateKeys.map(key => {
        const on = !!state[key]
        return `<div class="state-item">
          <span class="state-dot ${on ? 'on' : 'off'}"></span>
          <span>${key}</span>
        </div>`
      }).join('')
    }

    function renderPre(el, text) {
      if (!text) {
        el.textContent = '(empty)'
        el.className = 'empty'
      } else {
        el.textContent = text
        el.className = ''
      }
    }

    ipcRenderer.on('parser-update', (_evt, data) => {
      renderState(data.state)
      renderPre(elAssistant, data.assistant)
      renderPre(elStreaming, data.streaming)
      // Show last 20 lines of raw screen
      const screenLines = data.screen.split('\n')
      const tail = screenLines.slice(-20).join('\n')
      renderPre(elScreen, tail)
    })

    // Recording path display
    ipcRenderer.on('recording-path', (_evt, path) => {
      const el = document.getElementById('recording-path')
      // Show just the last directory name
      const short = path.split('/').pop() || path
      el.textContent = `rec: ${short}`
      el.title = path
    })

    // Reset button — kills codex, starts new recording, respawns
    document.getElementById('btn-reset').addEventListener('click', () => {
      term.clear()
      ipcRenderer.send('pty-reset')
    })

    // Initial fit after a tick
    setTimeout(() => fit.fit(), 100)
  </script>
</body>
</html>
